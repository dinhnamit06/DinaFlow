<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DinaFlow is a cute bio-productivity dashboard for focus tasks, flow coins, rewards, and recovery logs."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>DinaFlow</title>
  </head>
  <body>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;background:red;color:white;z-index:9999;padding:20px;font-family:monospace;width:100%;">' + e.error.stack + '</div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="position:fixed;top:50px;left:0;background:orange;color:white;z-index:9999;padding:20px;font-family:monospace;width:100%;">Promise: ' + e.reason + '</div>';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
